spring:
  application:
    name: entity-builder
  messages:
    basename: messages
    encoding: UTF-8
  cloud:
    vault:
      uri: ${VAULT_ADDR:http://127.0.0.1:8200}
      authentication: TOKEN
      token: ${VAULT_TOKEN:}
  config:
    import:
      - optional:vault://secret/erp/${SPRING_VAULT_ENV:dev}/common
      - optional:vault://secret/erp/${SPRING_VAULT_ENV:dev}/entity-builder
  # DevTools classpath restart + Flyway on CockroachDB strands a flyway-lock row → InsertRowLock / deadlock warnings.
  # LiveReload still works; full restart: stop and run bootRun again. Override: SPRING_DEVTOOLS_RESTART_ENABLED=true
  devtools:
    restart:
      enabled: false
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:26257/defaultdb?sslmode=disable}
    username: ${DATABASE_USER:root}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.CockroachDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Separate from IAM (which uses default flyway_schema_history) so version numbers do not collide on shared DBs.
    table: flyway_entity_builder_schema_history
    # IAM may already own objects in defaultdb; baseline lets Flyway create our history table without failing on "non-empty schema".
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: ${SERVER_PORT:8081}

app:
  flyway:
    # One-time fix: start with profile repair-flyway (see application-repair-flyway.yml), or set this to true once.
    repair-before-migrate: false
  jwt:
    issuer: ${JWT_ISSUER:erp-iam}
    audience: ${JWT_AUDIENCE:erp-api}
    access-token-expiration-seconds: ${JWT_ACCESS_EXPIRY:86400}
    refresh-token-expiration-seconds: ${JWT_REFRESH_EXPIRY:604800}
    hmac-secret: ${JWT_SECRET:}

entitybuilder:
  platform:
    # IAM bootstrap "ai" tenant UUID; required for entity-status provisioning and STANDARD_RECORD reads.
    tenant-id: ${ENTITY_BUILDER_PLATFORM_TENANT_ID:}
  pii:
    key: ${PII_KEY:}

