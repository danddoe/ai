spring:
  application:
    name: core-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:26257/defaultdb?sslmode=disable}
    username: ${DATABASE_USER:root}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.CockroachDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_core_service_schema_history
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: ${SERVER_PORT:8084}

app:
  jwt:
    issuer: ${JWT_ISSUER:erp-iam}
    audience: ${JWT_AUDIENCE:erp-api}
