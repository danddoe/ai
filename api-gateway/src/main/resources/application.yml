gateway:
  portal-host:
    core-service-url: ${CORE_SERVICE_URL:http://localhost:8084}
    cache-ttl-seconds: ${PORTAL_HOST_CACHE_TTL_SECONDS:60}
    trust-secret: ${GATEWAY_TRUST_SECRET:}

spring:
  application:
    name: api-gateway
  config:
    import:
      - optional:vault://secret/erp/${SPRING_VAULT_ENV:dev}/common
      - optional:vault://secret/erp/${SPRING_VAULT_ENV:dev}/api-gateway
  cloud:
    vault:
      uri: ${VAULT_ADDR:http://127.0.0.1:8200}
      authentication: TOKEN
      token: ${VAULT_TOKEN:}
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 60s
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns:
              - 'http://localhost:*'
              - 'http://127.0.0.1:*'
            allowed-methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowed-headers:
              - '*'
            allow-credentials: true
            max-age: 3600
      routes:
        # Global search BFF (omnibox)
        - id: global-search-omnibox
          uri: ${GLOBAL_SEARCH_URL:http://localhost:8082}
          predicates:
            - Path=/v1/search,/v1/search/**
        # Entity-builder (specific paths before IAM /v1/**)
        - id: core-service-master-data
          uri: ${CORE_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/v1/portal,/v1/portal/**,/v1/countries,/v1/countries/**,/v1/tenants/*/companies,/v1/tenants/*/companies/**,/v1/tenants/*/portal-host-bindings,/v1/tenants/*/portal-host-bindings/**,/v1/tenants/*/business-units,/v1/tenants/*/business-units/**,/v1/tenants/*/regions,/v1/tenants/*/regions/**,/v1/tenants/*/locations,/v1/tenants/*/locations/**,/v1/tenants/*/properties,/v1/tenants/*/properties/**,/v1/tenants/*/property-units,/v1/tenants/*/property-units/**
        - id: loans-module-tenant-loans
          uri: ${LOANS_MODULE_URL:http://localhost:8083}
          predicates:
            - Path=/v1/tenants/*/loans,/v1/tenants/*/loans/**
        - id: entity-builder-tenant-catalog
          uri: ${ENTITY_BUILDER_URL:http://localhost:8081}
          predicates:
            - Path=/v1/tenants/*/catalog,/v1/tenants/*/catalog/**
        - id: entity-builder-tenant-search
          uri: ${ENTITY_BUILDER_URL:http://localhost:8081}
          predicates:
            - Path=/v1/tenants/*/search,/v1/tenants/*/search/**
        - id: entity-builder-tenant-records
          uri: ${ENTITY_BUILDER_URL:http://localhost:8081}
          predicates:
            - Path=/v1/tenants/*/records,/v1/tenants/*/records/**
        - id: entity-builder-tenant-entities
          uri: ${ENTITY_BUILDER_URL:http://localhost:8081}
          predicates:
            - Path=/v1/tenants/*/entities,/v1/tenants/*/entities/**
        - id: entity-builder-entity-relationships
          uri: ${ENTITY_BUILDER_URL:http://localhost:8081}
          predicates:
            - Path=/v1/entity-relationships,/v1/entity-relationships/**
        # DDL import (portal): POST /v1/entities/import/ddl/preview and POST /v1/entities/import/ddl (explicit route ahead of generic /v1/entities/**).
        - id: entity-builder-entities-ddl-import
          order: -1
          uri: ${ENTITY_BUILDER_URL:http://localhost:8081}
          predicates:
            - Path=/v1/entities/import/ddl,/v1/entities/import/ddl/**
        - id: entity-builder-entities
          uri: ${ENTITY_BUILDER_URL:http://localhost:8081}
          predicates:
            - Path=/v1/entities,/v1/entities/**
        - id: entity-builder-form-layout-templates
          uri: ${ENTITY_BUILDER_URL:http://localhost:8081}
          predicates:
            - Path=/v1/form-layout-templates,/v1/form-layout-templates/**
        - id: entity-builder-entity-status
          uri: ${ENTITY_BUILDER_URL:http://localhost:8081}
          predicates:
            - Path=/v1/entity-status,/v1/entity-status/**
        # IAM
        - id: iam-auth
          uri: ${IAM_URL:http://localhost:8080}
          predicates:
            - Path=/auth,/auth/**
        - id: iam-well-known
          uri: ${IAM_URL:http://localhost:8080}
          predicates:
            - Path=/.well-known/**
        - id: iam-v1
          uri: ${IAM_URL:http://localhost:8080}
          predicates:
            - Path=/v1/**

server:
  port: ${GATEWAY_PORT:8000}
